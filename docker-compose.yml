services:
  api:
    image: ghcr.io/khoeun03/deps-judge/api:latest
    build:
      context: ./api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgres://deps_user:deps_pass@db:5432/deps_judge_db}
      PROBLEMS_PATH: ${PROBLEMS_PATH:-/data/problems}
      DEPS_JUDGE_DOMAIN: ${DEPS_JUDGE_DOMAIN}
    ports:
      - "4000:3000"
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./problems:/data/problems:ro
    networks:
      - deps-judge-net

  worker:
    image: ghcr.io/khoeun03/deps-judge/worker:latest
    build:
      context: ./worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./problems:/data/problems:ro
      - /tmp/deps-judge:/tmp/deps-judge
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://deps_user:deps_pass@db:5432/deps_judge_db}
      WORK_DIR: ${WORK_DIR:-/tmp/deps-judge}
      PROBLEMS_PATH: ${PROBLEMS_PATH:-/data/problems}
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - deps-judge-net

  db:
    image: postgres:16
    container_name: deps-judge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deps_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deps_pass}
      POSTGRES_DB: ${POSTGRES_DB:-deps_judge_db}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - deps-judge-net

volumes:
  db-data:

networks:
  deps-judge-net:
